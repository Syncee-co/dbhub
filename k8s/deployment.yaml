apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-db-deployment
  namespace: default
  labels:
    app: mcp-db-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-db-app
  template:
    metadata:
      labels:
        app: mcp-db-app
    spec:
      serviceAccountName: default-sa
      containers:
        - name: mcp-db-container
          image: europe-west4-docker.pkg.dev/syncee-cloud/syncee-docker/syncee-mcp-db:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: syncee-general-config
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "500m"
              memory: "1024Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
