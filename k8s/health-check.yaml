apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: mcp-db-health-check-policy
  namespace: default
spec:
  default:
    checkIntervalSec: 15
    timeoutSec: 15
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: /health
        port: 8080
  targetRef:
    group: ""
    kind: Service
    name: mcp-db-service
