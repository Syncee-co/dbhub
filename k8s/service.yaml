apiVersion: v1
kind: Service
metadata:
  name: mcp-db-service
  namespace: default
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/app-protocols: '{"http-port":"HTTP"}'
spec:
  selector:
    app: mcp-db-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: NodePort
